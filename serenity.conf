webdriver {
  driver = "chrome"
  base.url = "http://localhost:3001/"
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--headless=new", "--no-sandbox", "--disable-dev-shm-usage", "--window-size=1920,1080"]
    }
  }
}

serenity {
  project.name = "AUTO_FRONT_SCREENPLAY"
  take.screenshots = AFTER_EACH_STEP
}
